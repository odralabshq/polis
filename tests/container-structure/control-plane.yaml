# container-structure-test for polis-control-plane
# Validates the control-plane HTTP service image

schemaVersion: '2.0.0'

metadataTest:
  user: "65532"
  exposedPorts: ["9080"]

fileExistenceTests:
  - name: 'cp-server binary'
    path: '/usr/local/bin/cp-server'
    shouldExist: true
    permissions: '-rwxr-xr-x'

commandTests:
  - name: 'listen addr env'
    command: 'printenv'
    args: ['POLIS_CP_LISTEN_ADDR']
    exitCode: 0
    expectedOutput: ['0.0.0.0:9080']

  - name: 'valkey url env'
    command: 'printenv'
    args: ['POLIS_CP_VALKEY_URL']
    exitCode: 0
    expectedOutput: ['rediss://valkey:6379']

  - name: 'binary version'
    command: '/usr/local/bin/cp-server'
    args: ['--version']
    exitCode: 0
    expectedOutput: ['cp-server']
